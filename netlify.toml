[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    # X-Frame-Options udeladt med vilje: headeren kan ikke liste flere domaener
    # og er forældet. Embedding styres nu af CSP frame-ancestors nedenfor, saa
    # FLOW (flow.eventday.dk) kan vise TODO i en iframe.
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: http: blob:; connect-src 'self' https://ilbjytyukicbssqftmma.supabase.co wss://ilbjytyukicbssqftmma.supabase.co; frame-ancestors 'self' https://flow.eventday.dk;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
